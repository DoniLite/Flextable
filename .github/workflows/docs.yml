name: Docs

# Scoped to apps/docs so this workflow is inert until the docs site (Phase 6
# of the migration plan) actually exists there — pushes that don't touch
# apps/docs or the library packages it documents won't trigger a deploy.
on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - "packages/*/src/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build library packages
        run: bun run build

      - name: Build docs site
        run: bun run --cwd apps/docs build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
