name: Release

# Publishing is deliberately gated behind a tag push, not "every merge to
# main" — merging the Version Packages PR (see version.yml) only bumps
# versions/changelogs on main. A maintainer pushes a tag when they actually
# want that state released to npm.
on:
  push:
    tags:
      - '*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing (no NPM_TOKEN secret)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      # npm >=11.5.1 is required to publish via OIDC trusted publishing.
      # Changesets shells out to `npm publish`, so npm itself (not just bun)
      # needs to be recent enough, independent of the Bun version above.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Update npm for OIDC trusted publishing support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test:coverage

      - name: Publish to npm
        run: bun run release
