name: Version

# Runs on every push to main. Opens or updates a "Version Packages" PR from
# whatever changesets are pending — never publishes anything itself. Publishing
# happens separately, only when a maintainer pushes a tag (see release.yml),
# so merging the Version PR is a deliberate two-step process: merge to bump
# versions/changelogs, then tag to actually release.
on:
  push:
    branches: [main]

concurrency:
  group: version-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Open or update the Version Packages PR
        uses: changesets/action@v1
        with:
          version: bun run version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
